name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to build and publish (e.g. v1.3.1)"
        required: true
        type: string

permissions:
  contents: read

jobs:
  # Immutable releases: keep the GitHub release as draft until macOS assets are uploaded, then publish in publish-release.
  windows-exe:
    permissions:
      contents: write
    runs-on: windows-latest
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
    steps:
      - name: Resolve release tag and ref
        id: meta
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            T="${{ github.event.inputs.tag }}"
            T="${T#refs/tags/}"
            echo "tag=$T" >> "$GITHUB_OUTPUT"
            echo "ref=refs/tags/$T" >> "$GITHUB_OUTPUT"
          else
            echo "tag=$GITHUB_REF_NAME" >> "$GITHUB_OUTPUT"
            echo "ref=$GITHUB_REF" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.meta.outputs.ref }}
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      # Tags before ~v1.2.13 have no packaging/icons/; pull icon from default branch so PyInstaller / WiX still work.
      - name: Ensure HWTW.ico (old tags)
        shell: pwsh
        env:
          REPO: ${{ github.repository }}
        run: |
          $icon = Join-Path $env:GITHUB_WORKSPACE "packaging/icons/HWTW.ico"
          if (Test-Path -LiteralPath $icon) {
            Write-Host "Icon present in checkout."
            exit 0
          }
          Write-Host "::notice::HWTW.ico missing on this ref — downloading from main (same file as current branding)."
          $dir = Split-Path $icon -Parent
          New-Item -ItemType Directory -Force -Path $dir | Out-Null
          $url = "https://raw.githubusercontent.com/$env:REPO/main/packaging/icons/HWTW.ico"
          Invoke-WebRequest -Uri $url -OutFile $icon -MaximumRetryCount 3 -RetryIntervalSec 2
          if (-not (Test-Path -LiteralPath $icon) -or ((Get-Item -LiteralPath $icon).Length -lt 32)) {
            throw "Could not download valid icon from $url (private repo? network?)"
          }

      # MSI/WiX UI needs License.rtf; tags before the WiX MSI work (~v1.2.12) may not have packaging/wix/License.rtf.
      - name: Ensure WiX License.rtf (old tags)
        shell: pwsh
        env:
          REPO: ${{ github.repository }}
        run: |
          $license = Join-Path $env:GITHUB_WORKSPACE "packaging/wix/License.rtf"
          if (Test-Path -LiteralPath $license) {
            Write-Host "License.rtf present in checkout."
            exit 0
          }
          Write-Host "::notice::License.rtf missing on this ref — downloading from main."
          $dir = Split-Path $license -Parent
          New-Item -ItemType Directory -Force -Path $dir | Out-Null
          $url = "https://raw.githubusercontent.com/$env:REPO/main/packaging/wix/License.rtf"
          Invoke-WebRequest -Uri $url -OutFile $license -MaximumRetryCount 3 -RetryIntervalSec 2
          if (-not (Test-Path -LiteralPath $license) -or ((Get-Item -LiteralPath $license).Length -lt 8)) {
            throw "Could not download License.rtf from $url"
          }

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyinstaller psutil "sv-ttk>=2.6.0"

      # Absolute --icon avoids PyInstaller resolving relative paths against a shifting specpath on Windows.
      - name: Build executable
        shell: pwsh
        run: |
          $icon = Join-Path $env:GITHUB_WORKSPACE "packaging/icons/HWTW.ico"
          pyinstaller --onefile --windowed --name HWTW `
            --icon $icon `
            --collect-all sv_ttk --collect-all psutil `
            --collect-submodules psutil `
            --hidden-import=psutil --hidden-import=psutil._pswindows --hidden-import=psutil._psutil_windows `
            main.py

      - name: Copy requirements for sidecar install
        run: copy requirements.txt dist\

      - name: Install WiX Toolset v3 (MSI)
        run: |
          $uri = "https://github.com/wixtoolset/wix3/releases/download/wix3141rtm/wix314-binaries.zip"
          Invoke-WebRequest $uri -OutFile "$env:RUNNER_TEMP\wix.zip"
          Expand-Archive "$env:RUNNER_TEMP\wix.zip" -DestinationPath "$env:RUNNER_TEMP\wix" -Force
          Add-Content $env:GITHUB_PATH "$env:RUNNER_TEMP\wix"

      - name: Build HWTW.msi
        shell: pwsh
        run: |
          $tag = "${{ steps.meta.outputs.tag }}"
          $v = $tag.TrimStart('v')
          $parts = @($v.Split('.'))
          while ($parts.Count -lt 3) { $parts += '0' }
          $msiVer = "$($parts[0]).$($parts[1]).$($parts[2]).0"
          Write-Host "MSI ProductVersion=$msiVer"
          $icon = Join-Path $env:GITHUB_WORKSPACE "packaging/icons/HWTW.ico"
          New-Item -ItemType Directory -Force -Path obj | Out-Null
          & candle.exe -nologo -arch x64 -ext WixUIExtension `
            "-dProductVersion=$msiVer" `
            "-dHwtwExe=dist\HWTW.exe" `
            "-dReqTxt=dist\requirements.txt" `
            "-dIconIco=$icon" `
            -out obj\ `
            packaging\wix\HWTW.wxs
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          $license = (Resolve-Path (Join-Path $env:GITHUB_WORKSPACE "packaging/wix/License.rtf")).Path
          Write-Host "WixUILicenseRtf=$license"
          & light.exe -nologo -sw1076 -ext WixUIExtension `
            "-dWixUILicenseRtf=$license" `
            -b "$PWD" `
            -out dist\HWTW.msi obj\HWTW.wixobj
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          Get-Item dist\HWTW.msi | Format-List *

      - name: Write SHA256SUMS.txt (Windows assets)
        run: |
          python -c "import hashlib, pathlib; d=pathlib.Path('dist'); g=lambda n: hashlib.sha256(d.joinpath(n).read_bytes()).hexdigest(); names=['HWTW.exe','requirements.txt','HWTW.msi']; t='\n'.join([g(n)+'  '+n for n in names])+'\n'; d.joinpath('SHA256SUMS.txt').write_text(t, encoding='utf-8'); print(t)"

      # Immutable / re-runs: action-gh-release defaults to overwrite_files=true, which DELETEs assets first →
      # "Cannot delete asset from an immutable release". Drop draft and recreate; never delete published releases.
      - name: Prune draft release for tag (re-runs)
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -eux
          TAG="${{ steps.meta.outputs.tag }}"
          if ! gh release view "$TAG" --repo "${{ github.repository }}" &>/dev/null; then
            echo "No existing GitHub release for $TAG."
            exit 0
          fi
          DRAFT=$(gh release view "$TAG" --repo "${{ github.repository }}" --json isDraft -q '.isDraft')
          if [[ "$DRAFT" != "true" ]]; then
            echo "Release $TAG is published (not draft). Skipping delete — use a new tag or delete the release in the UI if you must replace assets."
            exit 0
          fi
          echo "Removing draft release $TAG so assets can be uploaded fresh..."
          gh release delete "$TAG" --repo "${{ github.repository }}" --yes

      - name: Create draft GitHub Release (Windows assets)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          draft: true
          prerelease: false
          make_latest: false
          overwrite_files: false
          generate_release_notes: true
          body: |
            ### Downloads for **${{ steps.meta.outputs.tag }}** (this release)

            These links point at **this tag’s assets** (correct even before **Latest** is updated).

            | Platform | Asset | Direct link |
            | -------- | ----- | ----------- |
            | Windows | Portable app | [`HWTW.exe`](https://github.com/${{ github.repository }}/releases/download/${{ steps.meta.outputs.tag }}/HWTW.exe) |
            | Windows | Installer (x64) | [`HWTW.msi`](https://github.com/${{ github.repository }}/releases/download/${{ steps.meta.outputs.tag }}/HWTW.msi) |
            | Windows | Python deps list | [`requirements.txt`](https://github.com/${{ github.repository }}/releases/download/${{ steps.meta.outputs.tag }}/requirements.txt) |
            | Windows | SHA-256 checksums | [`SHA256SUMS.txt`](https://github.com/${{ github.repository }}/releases/download/${{ steps.meta.outputs.tag }}/SHA256SUMS.txt) |
            | macOS | DMG (unsigned CI) | [`HWTW-macOS-unsigned.dmg`](https://github.com/${{ github.repository }}/releases/download/${{ steps.meta.outputs.tag }}/HWTW-macOS-unsigned.dmg) |
            | macOS | DMG (signed, if present) | [`HWTW-macOS.dmg`](https://github.com/${{ github.repository }}/releases/download/${{ steps.meta.outputs.tag }}/HWTW-macOS.dmg) |
            | macOS | App zip | [`HWTW-macOS.app.zip`](https://github.com/${{ github.repository }}/releases/download/${{ steps.meta.outputs.tag }}/HWTW-macOS.app.zip) |
            | macOS | PKG | [`HWTW-macOS.pkg`](https://github.com/${{ github.repository }}/releases/download/${{ steps.meta.outputs.tag }}/HWTW-macOS.pkg) |
            | macOS | SHA-256 checksums | [`SHA256SUMS-macos.txt`](https://github.com/${{ github.repository }}/releases/download/${{ steps.meta.outputs.tag }}/SHA256SUMS-macos.txt) |

            **After publish:** when this release is **[Latest](https://github.com/${{ github.repository }}/releases/latest)**, the same files are also at **`/releases/latest/download/<filename>`**.

            ---
          files: |
            dist/HWTW.exe
            dist/HWTW.msi
            dist/requirements.txt
            dist/SHA256SUMS.txt

  macos-dmg:
    needs: [windows-exe]
    permissions:
      contents: write
    runs-on: macos-latest
    steps:
      - name: Resolve release tag and ref
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            T="${{ github.event.inputs.tag }}"
            T="${T#refs/tags/}"
            echo "tag=$T" >> "$GITHUB_OUTPUT"
            echo "ref=refs/tags/$T" >> "$GITHUB_OUTPUT"
          else
            echo "tag=$GITHUB_REF_NAME" >> "$GITHUB_OUTPUT"
            echo "ref=$GITHUB_REF" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.meta.outputs.ref }}
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Verify Tcl/Tk
        run: python -c "import tkinter"

      - name: Ensure HWTW.ico (old tags)
        env:
          REPO: ${{ github.repository }}
        run: |
          set -eux
          ICON="packaging/icons/HWTW.ico"
          if [ -f "$ICON" ]; then echo "Icon present."; exit 0; fi
          echo "::notice::HWTW.ico missing on this ref — downloading from main."
          mkdir -p packaging/icons
          curl -fsSL --retry 3 --retry-delay 2 \
            "https://raw.githubusercontent.com/${REPO}/main/packaging/icons/HWTW.ico" \
            -o "$ICON"
          test -s "$ICON"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          # Pillow: PyInstaller on macOS converts .ico → .icns during build; without it, --icon *.ico often fails.
          python -m pip install pyinstaller psutil pillow "sv-ttk>=2.6.0"

      # Absolute --icon: same specpath/cwd pitfall as Windows; align flags with windows-exe where it matters.
      - name: Build HWTW.app (PyInstaller)
        run: |
          set -eux
          ICON="${GITHUB_WORKSPACE}/packaging/icons/HWTW.ico"
          test -f "$ICON"
          pyinstaller --windowed --name HWTW \
            --icon "$ICON" \
            --osx-bundle-identifier io.github.ta10101.HWTW \
            --collect-all sv_ttk --collect-all psutil \
            --collect-submodules psutil \
            --hidden-import=psutil \
            --hidden-import=psutil._psosx \
            main.py

      # secrets cannot be used in `if:` or in `${{ }}` inside `run:` — only as direct env/with values.
      # Branch in the shell on whether the secret-backed env var is non-empty.
      - name: Choose DMG base name
        id: names
        env:
          P12_BASE64: ${{ secrets.MACOS_CERTIFICATE_P12 }}
        run: |
          if [ -n "$P12_BASE64" ]; then
            echo "dmg=HWTW-macOS.dmg" >> "$GITHUB_OUTPUT"
          else
            echo "dmg=HWTW-macOS-unsigned.dmg" >> "$GITHUB_OUTPUT"
          fi

      - name: Import Apple signing certificate
        env:
          P12_BASE64: ${{ secrets.MACOS_CERTIFICATE_P12 }}
          P12_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
        run: |
          if [ -z "$P12_BASE64" ]; then
            echo "No MACOS_CERTIFICATE_P12 secret; skipping keychain import"
            exit 0
          fi
          echo "$P12_BASE64" | base64 --decode > /tmp/cert.p12
          security create-keychain -p actions build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p actions build.keychain
          security import /tmp/cert.p12 -k build.keychain -P "$P12_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k actions build.keychain
          rm -f /tmp/cert.p12

      - name: Build and optionally sign / notarize DMG
        env:
          MACOS_CODESIGN_IDENTITY: ${{ secrets.MACOS_CODESIGN_IDENTITY }}
          MACOS_NOTARIZE_APPLE_ID: ${{ secrets.MACOS_NOTARIZE_APPLE_ID }}
          MACOS_NOTARIZE_TEAM_ID: ${{ secrets.MACOS_NOTARIZE_TEAM_ID }}
          MACOS_NOTARIZE_APP_PASSWORD: ${{ secrets.MACOS_NOTARIZE_APP_PASSWORD }}
          DMG_NAME: ${{ steps.names.outputs.dmg }}
        run: bash packaging/build-macos-dmg.sh

      - name: Package version for .pkg
        id: pkgver
        run: |
          V="${{ steps.meta.outputs.tag }}"
          V="${V#v}"
          V="${V%%-*}"
          a=0; b=0; c=0
          IFS=. read -r a b c <<<"$V"
          : "${a:=0}"; : "${b:=0}"; : "${c:=0}"
          echo "version=${a}.${b}.${c}" >> "$GITHUB_OUTPUT"

      - name: Zip .app, build .pkg, macOS checksums
        env:
          DMG_NAME: ${{ steps.names.outputs.dmg }}
          PKG_VERSION: ${{ steps.pkgver.outputs.version }}
        run: bash packaging/build-macos-zip-pkg.sh

      - name: Attach macOS assets to draft release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          draft: true
          overwrite_files: false
          generate_release_notes: false
          files: |
            dist/${{ steps.names.outputs.dmg }}
            dist/HWTW-macOS.app.zip
            dist/HWTW-macOS.pkg
            dist/SHA256SUMS-macos.txt

  publish-release:
    name: Publish release (draft → public, Latest)
    needs: [windows-exe, macos-dmg]
    if: ${{ always() && needs['windows-exe'].result == 'success' }}
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -eux
          TAG="${{ needs['windows-exe'].outputs.tag }}"
          REPO="${{ github.repository }}"
          # PATCH is reliable for draft→published + make_latest (gh release edit --latest can miss edge cases).
          RID=$(gh api "repos/${REPO}/releases/tags/${TAG}" -q .id)
          gh api "repos/${REPO}/releases/${RID}" -X PATCH \
            -f draft=false \
            -f make_latest=true
          gh release view "$TAG" -R "$REPO"
