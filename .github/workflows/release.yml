name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  # Publish Windows first so HWTW.exe + SHA256SUMS always ship even if macOS fails later.
  windows-exe:
    permissions:
      contents: write
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyinstaller psutil "sv-ttk>=2.6.0"

      - name: Build executable
        run: >
          pyinstaller --onefile --windowed --name HWTW
          --collect-all sv_ttk --collect-all psutil
          --hidden-import=psutil
          main.py

      - name: Copy requirements for sidecar install
        run: copy requirements.txt dist\

      - name: Write SHA256SUMS.txt (Windows assets)
        run: |
          python -c "import hashlib, pathlib; d=pathlib.Path('dist'); g=lambda n: hashlib.sha256(d.joinpath(n).read_bytes()).hexdigest(); t='\n'.join([g('HWTW.exe')+'  HWTW.exe', g('requirements.txt')+'  requirements.txt'])+'\n'; d.joinpath('SHA256SUMS.txt').write_text(t, encoding='utf-8'); print(t)"

      - name: Create GitHub Release (Windows)
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/HWTW.exe
            dist/requirements.txt
            dist/SHA256SUMS.txt

  macos-dmg:
    needs: [windows-exe]
    permissions:
      contents: write
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Verify Tcl/Tk
        run: python -c "import tkinter"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyinstaller psutil "sv-ttk>=2.6.0"

      - name: Build HWTW.app (PyInstaller)
        run: |
          pyinstaller --windowed --name HWTW \
            --osx-bundle-identifier io.github.ta10101.HWTW \
            --collect-all sv_ttk --collect-all psutil \
            --hidden-import=psutil \
            main.py

      - name: Choose DMG base name
        id: names
        env:
          HAS_P12: ${{ secrets.MACOS_CERTIFICATE_P12 != '' }}
        run: |
          if [ "$HAS_P12" = "true" ]; then
            echo "dmg=HWTW-macOS.dmg" >> "$GITHUB_OUTPUT"
          else
            echo "dmg=HWTW-macOS-unsigned.dmg" >> "$GITHUB_OUTPUT"
          fi

      - name: Import Apple signing certificate
        if: ${{ secrets.MACOS_CERTIFICATE_P12 != '' }}
        env:
          P12_BASE64: ${{ secrets.MACOS_CERTIFICATE_P12 }}
          P12_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
        run: |
          echo "$P12_BASE64" | base64 --decode > /tmp/cert.p12
          security create-keychain -p actions build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p actions build.keychain
          security import /tmp/cert.p12 -k build.keychain -P "$P12_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k actions build.keychain
          rm -f /tmp/cert.p12

      - name: Build and optionally sign / notarize DMG
        env:
          MACOS_CODESIGN_IDENTITY: ${{ secrets.MACOS_CODESIGN_IDENTITY }}
          MACOS_NOTARIZE_APPLE_ID: ${{ secrets.MACOS_NOTARIZE_APPLE_ID }}
          MACOS_NOTARIZE_TEAM_ID: ${{ secrets.MACOS_NOTARIZE_TEAM_ID }}
          MACOS_NOTARIZE_APP_PASSWORD: ${{ secrets.MACOS_NOTARIZE_APP_PASSWORD }}
          DMG_NAME: ${{ steps.names.outputs.dmg }}
        run: bash packaging/build-macos-dmg.sh

      - name: DMG checksum
        env:
          DMG_NAME: ${{ steps.names.outputs.dmg }}
        run: |
          cd dist
          HASH=$(shasum -a 256 "$DMG_NAME" | awk '{print $1}')
          echo "$HASH  $(basename "$DMG_NAME")" > SHA256SUMS-macos-dmg.txt
          cat SHA256SUMS-macos-dmg.txt

      - name: Attach macOS assets to release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: false
          files: |
            dist/${{ steps.names.outputs.dmg }}
            dist/SHA256SUMS-macos-dmg.txt
