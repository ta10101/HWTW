name: Release

on:
  push:
    tags:
      - "v*"

# Least privilege: only the release job may write contents (upload assets).
permissions:
  contents: read

jobs:
  windows-exe:
    permissions:
      contents: write
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyinstaller psutil "sv-ttk>=2.6.0"

      - name: Build executable
        run: pyinstaller --onefile --windowed --name HWTW --collect-all sv_ttk main.py

      - name: Copy requirements for sidecar install
        run: copy requirements.txt dist\

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/HWTW.exe
            dist/requirements.txt
          generate_release_notes: true
