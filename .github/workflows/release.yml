name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  windows-exe:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyinstaller psutil "sv-ttk>=2.6.0"

      # psutil uses native extensions; --collect-all ensures .pyd files ship (importlib hooks often miss them).
      - name: Build executable
        run: >
          pyinstaller --onefile --windowed --name HWTW
          --collect-all sv_ttk --collect-all psutil
          --hidden-import=psutil
          main.py

      - name: Copy requirements for sidecar install
        run: copy requirements.txt dist\

      - name: Upload Windows build artifact
        uses: actions/upload-artifact@v4
        with:
          name: hwtw-windows
          path: |
            dist/HWTW.exe
            dist/requirements.txt

  macos-dmg:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Verify Tcl/Tk
        run: python -c "import tkinter"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyinstaller psutil "sv-ttk>=2.6.0"

      - name: Build HWTW.app (PyInstaller)
        run: |
          pyinstaller --windowed --name HWTW \
            --osx-bundle-identifier io.github.ta10101.HWTW \
            --collect-all sv_ttk \
            main.py

      - name: Choose DMG base name
        id: names
        env:
          HAS_P12: ${{ secrets.MACOS_CERTIFICATE_P12 != '' }}
        run: |
          if [ "$HAS_P12" = "true" ]; then
            echo "dmg=HWTW-macOS.dmg" >> "$GITHUB_OUTPUT"
          else
            echo "dmg=HWTW-macOS-unsigned.dmg" >> "$GITHUB_OUTPUT"
          fi

      - name: Import Apple signing certificate
        if: ${{ secrets.MACOS_CERTIFICATE_P12 != '' }}
        env:
          P12_BASE64: ${{ secrets.MACOS_CERTIFICATE_P12 }}
          P12_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
        run: |
          echo "$P12_BASE64" | base64 --decode > /tmp/cert.p12
          security create-keychain -p actions build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p actions build.keychain
          security import /tmp/cert.p12 -k build.keychain -P "$P12_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k actions build.keychain
          rm -f /tmp/cert.p12

      - name: Build and optionally sign / notarize DMG
        env:
          MACOS_CODESIGN_IDENTITY: ${{ secrets.MACOS_CODESIGN_IDENTITY }}
          MACOS_NOTARIZE_APPLE_ID: ${{ secrets.MACOS_NOTARIZE_APPLE_ID }}
          MACOS_NOTARIZE_TEAM_ID: ${{ secrets.MACOS_NOTARIZE_TEAM_ID }}
          MACOS_NOTARIZE_APP_PASSWORD: ${{ secrets.MACOS_NOTARIZE_APP_PASSWORD }}
          DMG_NAME: ${{ steps.names.outputs.dmg }}
        run: bash packaging/build-macos-dmg.sh

      - name: Upload macOS DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: hwtw-macos
          path: dist/${{ steps.names.outputs.dmg }}

  publish-release:
    needs: [windows-exe, macos-dmg]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Windows assets
        uses: actions/download-artifact@v4
        with:
          name: hwtw-windows
          path: publish

      - name: Download macOS DMG
        uses: actions/download-artifact@v4
        with:
          name: hwtw-macos
          path: publish

      - name: SHA256 checksums
        run: |
          cd publish
          ls -la
          sha256sum HWTW.exe requirements.txt *.dmg > SHA256SUMS.txt
          echo "--- SHA256SUMS.txt ---"
          cat SHA256SUMS.txt

      # Single glob: publish/ holds exe, requirements.txt, one .dmg, SHA256SUMS.txt
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: publish/*
